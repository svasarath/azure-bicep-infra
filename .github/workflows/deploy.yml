# ============================================================
# .github/workflows/deploy.yml
# Full CI/CD: lint → test → build → infra → deploy
# Auth: Federated Identity (OIDC) — no long-lived secrets
# ============================================================

name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

# Minimal permissions — grant only what each job needs
permissions:
  contents:      read
  id-token:      write   # Required for OIDC federation
  pull-requests: write   # For posting plan comments on PRs
  packages:      write   # For GHCR (optional)

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Environment Matrix ────────────────────────────────────────
env:
  AZURE_TENANT_ID    : ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION : ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  PROJECT_NAME       : myapp
  BICEP_DIR          : ./infra

# ─────────────────────────────────────────────────────────────
jobs:

# ── 1. Bicep Lint ─────────────────────────────────────────────
  test:
    name: 🧪 Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Lint main.bicep
        run: bicep lint infra/main.bicep

      - name: Lint all modules
        run: |
          find infra/modules -name "*.bicep" | while read f; do
            echo "Linting $f..."
            bicep lint "$f"
          done

# ── 2. Bicep Lint & What-If ───────────────────────────────────
  infra-plan:
    name: 🔍 Bicep What-If
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id       : ${{ env.AZURE_TENANT_ID }}
          subscription-id : ${{ env.AZURE_SUBSCRIPTION }}
          client-id       : ${{ secrets.AZURE_CLIENT_ID }}    # Managed identity client ID

      - name: Bicep lint
        run: az bicep lint --file ${{ env.BICEP_DIR }}/main.bicep

      - name: What-If (dry run)
        id: whatif
        run: |
          az deployment sub what-if \
            --location eastus \
            --template-file ${{ env.BICEP_DIR }}/main.bicep \
            --parameters env=${{ env.DEPLOY_ENV }} \
                         projectName=${{ env.PROJECT_NAME }} \
                         githubActionsPrincipalId=${{ secrets.GITHUB_ACTIONS_PRINCIPAL_ID }} \
            --output json > whatif.json
          cat whatif.json

      - name: Comment PR with What-If diff
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('whatif.json', 'utf8');
            const body = `### 🔍 Bicep What-If Results\n\`\`\`json\n${diff.slice(0, 3000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

# ── 3. Build & Push Docker Image ─────────────────────────────
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id       : ${{ env.AZURE_TENANT_ID }}
          subscription-id : ${{ env.AZURE_SUBSCRIPTION }}
          client-id       : ${{ secrets.AZURE_CLIENT_ID }}

      - name: Get ACR login server
        id: acr
        run: |
          SERVER=$(az acr show \
            --name acr${{ env.PROJECT_NAME }}${{ env.DEPLOY_ENV }} \
            --query loginServer -o tsv)
          echo "server=$SERVER" >> "$GITHUB_OUTPUT"

      - name: ACR login (managed identity)
        run: az acr login --name acr${{ env.PROJECT_NAME }}${{ env.DEPLOY_ENV }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr.outputs.server }}/${{ env.PROJECT_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        id: push
        uses: docker/build-push-action@v5
        with:
          context:   .
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.acr.outputs.server }}/${{ env.PROJECT_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ steps.acr.outputs.server }}/${{ env.PROJECT_NAME }}:buildcache,mode=max

# ── 4. Deploy Infrastructure ──────────────────────────────────
  infra-deploy:
    name: 🏗️ Deploy Infra
    runs-on: ubuntu-latest
    needs: [infra-plan, build]
    if: github.event_name != 'pull_request'
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
      url:  ${{ steps.deploy.outputs.appUrl }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id       : ${{ env.AZURE_TENANT_ID }}
          subscription-id : ${{ env.AZURE_SUBSCRIPTION }}
          client-id       : ${{ secrets.AZURE_CLIENT_ID }}

      - name: Deploy Bicep
        id: deploy
        run: |
          OUTPUT=$(az deployment sub create \
            --location eastus \
            --template-file ${{ env.BICEP_DIR }}/main.bicep \
            --parameters env=${{ env.DEPLOY_ENV }} \
                         projectName=${{ env.PROJECT_NAME }} \
                         githubActionsPrincipalId=${{ secrets.GITHUB_ACTIONS_PRINCIPAL_ID }} \
                         appPrincipalId=${{ secrets.APP_PRINCIPAL_ID }} \
            --query properties.outputs \
            --output json)

          echo "$OUTPUT" | jq .
          APP_NAME=$(echo $OUTPUT | jq -r '.appServiceName.value')
          echo "appName=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "appUrl=https://$APP_NAME.azurewebsites.net" >> "$GITHUB_OUTPUT"

# ── 5. Deploy Application ─────────────────────────────────────
  app-deploy:
    name: 🚀 Deploy App
    runs-on: ubuntu-latest
    needs: infra-deploy
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id       : ${{ env.AZURE_TENANT_ID }}
          subscription-id : ${{ env.AZURE_SUBSCRIPTION }}
          client-id       : ${{ secrets.AZURE_CLIENT_ID }}

      - name: Update App Service container image
        run: |
          az webapp config container set \
            --name     ${{ needs.infra-deploy.outputs.appName }} \
            --resource-group rg-${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }} \
            --docker-custom-image-name ${{ needs.build.outputs.image-tag }}

      - name: Restart App Service
        run: |
          az webapp restart \
            --name           ${{ needs.infra-deploy.outputs.appName }} \
            --resource-group rg-${{ env.PROJECT_NAME }}-${{ env.DEPLOY_ENV }}

      - name: Health check
        run: |
          URL="https://${{ needs.infra-deploy.outputs.appName }}.azurewebsites.net/health"
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i — HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          echo "Health check failed" && exit 1